<!-- Blog Detail Hero -->
<section class="blog-hero" *ngIf="post">
  <div class="hero-image">
    <img [src]="post.image" [alt]="post.title" />
  </div>
  <div class="container">
    <div class="blog-header">
      <span class="blog-category">{{ post.category }}</span>
      <h1>{{ post.title }}</h1>
      <div class="blog-meta">
        <span class="author">By {{ post.author }}</span>
        <span class="separator">•</span>
        <span class="date">{{ formatDate(post.date) }}</span>
        <span class="separator">•</span>
        <span class="read-time">{{ post.readTime }}</span>
      </div>
    </div>
  </div>
</section>

<!-- Blog Content -->
<section class="blog-content" *ngIf="post">
  <div class="container">
    <article class="blog-article">
      <div [innerHTML]="post.content"></div>
    </article>

    <!-- FAQ Section -->
    <div class="faq-section" *ngIf="post.faqs && post.faqs.length > 0">
      <h2>Frequently Asked Questions</h2>
      <div class="faq-list">
        <div class="faq-item" *ngFor="let faq of post.faqs" [class.open]="faq.isOpen">
          <button class="faq-question" (click)="toggleFaq(faq)">
            <span>{{ faq.question }}</span>
            <svg class="faq-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="6 9 12 15 18 9"></polyline>
            </svg>
          </button>
          <div class="faq-answer" [class.show]="faq.isOpen">
            <p>{{ faq.answer }}</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Back to Blog -->
    <div class="back-to-blog">
      <a routerLink="/blog" class="back-link">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="19" y1="12" x2="5" y2="12"></line>
          <polyline points="12 19 5 12 12 5"></polyline>
        </svg>
        Back to All Posts
      </a>
    </div>
  </div>
</section>

<!-- Not Found -->
<section class="not-found" *ngIf="!post">
  <div class="container">
    <h2>Blog Post Not Found</h2>
    <p>Sorry, we couldn't find the blog post you're looking for.</p>
    <a routerLink="/blog" class="btn btn-primary">View All Posts</a>
  </div>
</section>

<!-- CTA Section -->
<app-cta></app-cta>
