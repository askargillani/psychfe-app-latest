<!-- Hero Section -->
<section class="hero-section">
  <div class="container">
    <h1>Our Services</h1>
    <p class="hero-subtitle">Personalized mental health solutions tailored to your unique needs. We're here to support your wellness journey every step of the way.</p>
  </div>
</section>

<!-- Services Grid -->
<section class="services-section">
  <div class="container">
    <div class="services-grid">
      <div class="service-card" *ngFor="let service of services">
        <h3>{{ service.name }}</h3>
        <p class="service-description">{{ service.description }}</p>

        <h4>Key Benefits:</h4>
        <ul class="benefits-list">
          <li *ngFor="let benefit of service.benefits">{{ benefit }}</li>
        </ul>

        <a [routerLink]="['/contact']" class="btn btn-primary btn-sm">Learn More</a>
      </div>
    </div>
  </div>
</section>

<!-- CTA Section -->
<app-cta 
  heading="Ready to Start Your Journey to Better Mental Health?"
  description="Whether you're looking to explore our services or ready to schedule your first appointment, we're here to support you every step of the way."
  primaryButtonText="Book an Appointment"
  primaryButtonUrl="https://www.zocdoc.com/practice/circle-psychiatry-group-95646?lock=true&isNewPatient=false&referrerType=widget&LocIdent=233810"
  secondaryButtonText="Contact Us"
  secondaryButtonRoute="/contact"
  [isExternalLink]="true">
</app-cta>
